<!--
  Evergeaux Travel Co — Adobe Stock Video Embed (High Quality)
  ================================================================
  Paste this whole block into a Squarespace Code Block.

  BEFORE PASTING: upload these 2 files to your GitHub repo,
  replacing the earlier lower-quality versions:
    adobestock-316302402-hq.mp4          (19.6MB, full 1080p)
    adobestock-316302402-hq-poster.jpg

  This version is noticeably sharper — full 1080p instead of
  1280px-wide, and a much lighter compression setting. The
  tradeoff is a larger file (19.6MB vs the earlier 6.3MB), but
  the lazy-load setup means it still won't slow down page load —
  it just doesn't start downloading until someone scrolls to it.
-->

<div class="evg-video-wrap">
  <video
    id="evg-adobe-video-hq"
    class="evg-video"
    poster="https://cdn.jsdelivr.net/gh/brandi-225/Evergeauxwebsite@main/adobestock-316302402-hq-poster.jpg"
    preload="none"
    muted
    loop
    playsinline
    autoplay
  >
    <source data-src="https://cdn.jsdelivr.net/gh/brandi-225/Evergeauxwebsite@main/adobestock-316302402-hq.mp4" type="video/mp4">
  </video>
</div>

<style>
  .evg-video-wrap {
    position: relative;
    width: 100%;
    max-width: 1280px;
    margin: 0 auto;
    aspect-ratio: 16 / 9;
    overflow: hidden;
    border-radius: 12px;
    background: #16243B;
  }
  .evg-video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
</style>

<script>
  (function () {
    var video = document.getElementById('evg-adobe-video-hq');
    if (!video) return;

    function loadSources() {
      var sources = video.querySelectorAll('source[data-src]');
      sources.forEach(function (s) {
        s.src = s.getAttribute('data-src');
      });
      video.load();
      video.play().catch(function () {});
    }

    if ('IntersectionObserver' in window) {
      var observer = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) {
            loadSources();
            observer.disconnect();
          }
        });
      }, { rootMargin: '200px' });
      observer.observe(video);
    } else {
      loadSources();
    }
  })();
</script>
